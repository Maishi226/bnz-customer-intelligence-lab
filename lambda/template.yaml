AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lex V2 fulfillment for BNZ Customer Intelligence Lab

Parameters:
  BedrockAdvisorModelId:
    Type: String
    Default: amazon.nova-lite-v1:0

Resources:
  LexFulfillmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bnz-customer-lab-lex-fulfillment
      CodeUri: .
      Handler: lex_fulfillment.handler
      Runtime: python3.13
      Architectures: [arm64]
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          BEDROCK_ADVISOR_MODEL_ID: !Ref BedrockAdvisorModelId
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'

Outputs:
  FulfillmentFunctionArn:
    Value: !GetAtt LexFulfillmentFunction.Arn
